    <!-- Contact Section -->
    <div class="isolate bg-white px-6 py-24 sm:py-32 lg:px-8">
      <div class="mx-auto max-w-2xl text-center">
        <h2
          id="contact"
          aria-label="contact"
          class="text-4xl font-semibold tracking-tight text-balance text-orange-400 sm:text-5xl lg:text-6xl"
          data-i18n="contact.heading"
        >
          Contact
        </h2>
        <p class="mt-2 text-lg/8 text-gray-600" data-i18n="contact.subheading">Get in touch with Kevin</p>
      </div>
      <div id="contact-info" class="mt-12 max-w-2xl mx-auto text-center">
        <ul role="list" class="space-y-3">
          <li>
            <a href="mailto:cromleyk@icloud.com"
              class="text-lg font-semibold text-gray-900 hover:text-orange-400 transition-colors"
            >
              <span data-i18n="contact.emailLabel">Email:</span> cromleyk@icloud.com
            </a>
          </li>
          <li>
            <a href="tel:+16199448759"
              class="text-lg font-semibold text-gray-900 hover:text-orange-400 transition-colors"
            >
              +1 (619) 944-8759
            </a>
          </li>
        </ul>

        <!-- WhatsApp Button -->
        <a
          href="https://wa.me/16199448759"
          target="_blank"
          rel="noopener"
          class="inline-flex items-center gap-2 mt-6 px-6 py-3 rounded-full font-semibold text-white transition-transform hover:scale-105 active:scale-95"
          style="background-color: #25D366;"
          aria-label="Chat on WhatsApp"

          </svg>
          <span data-i18n="contact.whatsapp">Chat on WhatsApp</span>

      <!-- Divider -->
      <div class="max-w-xl mx-auto mt-12 mb-2 flex items-center gap-4">
        <div class="flex-1 border-t border-gray-200"></div>
        <span class="text-sm text-gray-400 font-medium" data-i18n="contact.divider">or send a message</span>
        <div class="flex-1 border-t border-gray-200"></div>
      </div>

      <!-- Contact Form -->
      <form
        action="https://formspree.io/f/mzdypqna"
        method="POST"
        class="max-w-xl mx-auto mt-6 space-y-5"
      >
        <div>
          <label for="contact-name" class="block text-sm font-semibold text-gray-700 mb-1" data-i18n="contact.name">Your Name</label>
          <input type="text" name="name" id="contact-name" placeholder="Jane Smith" data-i18n-placeholder="contact.namePh" required />
        </div>
        <div>
          <label for="contact-email" class="block text-sm font-semibold text-gray-700 mb-1" data-i18n="contact.email">Your Email</label>
          <input type="email" name="email" id="contact-email" placeholder="you@example.com" data-i18n-placeholder="contact.emailPh" required />
        </div>
        <div>
          <label for="contact-message" class="block text-sm font-semibold text-gray-700 mb-1" data-i18n="contact.message">Message</label>
          <textarea name="message" id="contact-message" rows="5" placeholder="Your message..." data-i18n-placeholder="contact.messagePh" required style="max-width:100%;resize:vertical;"></textarea>
        </div>
        <button
          type="submit"
          class="w-full bg-orange-400 hover:bg-orange-500 text-white font-semibold py-3 px-6 rounded-full transition-colors shadow-md"
          data-i18n="contact.send"
        >
          Send Message
        </button>
      </form>
